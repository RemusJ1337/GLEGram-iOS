name: Build Unsigned GLEGram

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      bundle_id:
        description: "Bundle ID for the build"
        required: false
        default: "com.example.glegram.trollstore"
      team_id:
        description: "Team ID used in generated config"
        required: false
        default: "C67CF9S4VU"
      build_number:
        description: "Optional explicit build number"
        required: false
        default: ""

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Force submodule initialization
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1 || true
          mkdir -p build-system/bazel-rules
          for repo in \
            rules_apple \
            rules_swift \
            apple_support \
            rules_xcodeproj \
            sourcekit-bazel-bsp
          do
            if [[ ! -d "build-system/bazel-rules/${repo}" ]]; then
              git clone --depth 1 "https://github.com/$(git config -f .gitmodules --get submodule.build-system/bazel-rules/${repo}.url | sed 's#https://github.com/##')" "build-system/bazel-rules/${repo}"
            fi
          done
          test -d build-system/bazel-rules/sourcekit-bazel-bsp

      - name: Restore missing bazel-utils from Telegram upstream
        run: |
          set -euo pipefail
          if [[ ! -d build-system/bazel-utils ]]; then
            tmp_dir="$(mktemp -d)"
            git clone --depth 1 --filter=blob:none --sparse https://github.com/TelegramMessenger/Telegram-iOS.git "$tmp_dir/telegram-upstream"
            cd "$tmp_dir/telegram-upstream"
            git sparse-checkout set build-system/bazel-utils
            cd "$GITHUB_WORKSPACE"
            mkdir -p build-system
            cp -R "$tmp_dir/telegram-upstream/build-system/bazel-utils" build-system/
            rm -rf "$tmp_dir"
          fi
          test -f build-system/bazel-utils/plist_fragment.bzl
          test -f build-system/bazel-utils/spm.bzl

      - name: Validate required secrets
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          set -euo pipefail
          if [[ -z "${TELEGRAM_API_ID}" ]]; then
            echo "::error::Missing repository secret TELEGRAM_API_ID"
            exit 1
          fi
          if [[ -z "${TELEGRAM_API_HASH}" ]]; then
            echo "::error::Missing repository secret TELEGRAM_API_HASH"
            exit 1
          fi

      - name: Select Xcode version from versions.json
        run: |
          set -euo pipefail
          XCODE_VERSION="$(python3 - <<'PY'
          import json
          with open("versions.json", "r", encoding="utf-8") as fh:
              print(json.load(fh)["xcode"])
          PY
          )"
          sudo xcode-select -s "/Applications/Xcode_${XCODE_VERSION}.app/Contents/Developer"
          xcodebuild -version

      - name: Create canonical source directory
        run: |
          set -euo pipefail
          sudo rm -rf /Users/Shared/telegram-ios
          sudo mkdir -p /Users/Shared
          sudo cp -R "$GITHUB_WORKSPACE" /Users/Shared/telegram-ios
          sudo chown -R "$(id -un)":"$(id -gn)" /Users/Shared/telegram-ios

      - name: Prepare build configuration
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          INPUT_BUNDLE_ID: ${{ github.event.inputs.bundle_id }}
          INPUT_TEAM_ID: ${{ github.event.inputs.team_id }}
        run: |
          set -euo pipefail
          cd /Users/Shared/telegram-ios
          python3 - <<'PY'
          import json
          import os

          with open("build-system/ipa-build-configuration.json", "r", encoding="utf-8") as fh:
              config = json.load(fh)

          config["bundle_id"] = os.environ.get("INPUT_BUNDLE_ID") or "com.example.glegram.trollstore"
          config["api_id"] = os.environ["TELEGRAM_API_ID"]
          config["api_hash"] = os.environ["TELEGRAM_API_HASH"]
          config["team_id"] = os.environ.get("INPUT_TEAM_ID") or "C67CF9S4VU"
          config["appstore_id"] = "0"
          config["enable_siri"] = False
          config["enable_icloud"] = False

          with open("build-system/github-actions-configuration.json", "w", encoding="utf-8") as fh:
              json.dump(config, fh, indent=2)
          PY

      - name: Import fake signing certificates
        run: |
          set -euo pipefail
          cd /Users/Shared/telegram-ios
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs

      - name: Restore missing Opus prebuilts
        run: |
          set -euo pipefail
          cd /Users/Shared/telegram-ios
          mkdir -p third-party/opus/prebuilt/arm64
          mkdir -p third-party/opus/prebuilt/sim_arm64

          if [[ ! -f third-party/opus/prebuilt/arm64/libopus.a ]]; then
            rm -rf third-party/opus/build-arm64
            mkdir -p third-party/opus/build-arm64
            sh third-party/opus/build-opus-bazel.sh arm64 third-party/opus/build-arm64 ../opus-1.5.1.tar.gz
            cp third-party/opus/build-arm64/built/lib/libopus.a third-party/opus/prebuilt/arm64/libopus.a
          fi

          if [[ ! -f third-party/opus/prebuilt/sim_arm64/libopus.a ]]; then
            rm -rf third-party/opus/build-sim_arm64
            mkdir -p third-party/opus/build-sim_arm64
            sh third-party/opus/build-opus-bazel.sh sim_arm64 third-party/opus/build-sim_arm64 ../opus-1.5.1.tar.gz
            cp third-party/opus/build-sim_arm64/built/lib/libopus.a third-party/opus/prebuilt/sim_arm64/libopus.a
          fi

          test -f third-party/opus/prebuilt/arm64/libopus.a
          test -f third-party/opus/prebuilt/sim_arm64/libopus.a

      - name: Build unsigned IPA
        env:
          INPUT_BUILD_NUMBER: ${{ github.event.inputs.build_number }}
        run: |
          set -euo pipefail

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT=/private/var/tmp/_bazel_glegram

          cd "$SOURCE_DIR"

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"
          APP_VERSION="$(python3 - <<'PY'
          import json
          with open("versions.json", "r", encoding="utf-8") as fh:
              print(json.load(fh)["app"])
          PY
          )"
          COMMIT_COUNT="$(git rev-list --count HEAD)"
          DEFAULT_BUILD_NUMBER="$((COMMIT_COUNT + BUILD_NUMBER_OFFSET))"
          BUILD_NUMBER="${INPUT_BUILD_NUMBER:-$DEFAULT_BUILD_NUMBER}"

          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/github-actions-configuration.json" \
            --codesigningInformationPath="build-system/fake-codesigning" \
            --configuration="release_arm64" \
            --buildNumber="$BUILD_NUMBER" \
            --target "GLEGram" \
            --outputBuildArtifactsPath="build/artifacts"

      - name: Verify build artifacts
        run: |
          set -euo pipefail
          cd /Users/Shared/telegram-ios
          test -f build/artifacts/GLEGram.ipa
          test -f build/artifacts/GLEGram.DSYMs.zip

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GLEGram-unsigned-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: |
            /Users/Shared/telegram-ios/build/artifacts/GLEGram.ipa
            /Users/Shared/telegram-ios/build/artifacts/GLEGram.DSYMs.zip
          if-no-files-found: error
          retention-days: 7
